<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin V5</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #111;
  color: white;
}

h1 {
  margin-bottom: 20px;
}

.tabs button {
  margin-right: 10px;
  padding: 10px;
  cursor: pointer;
}

.card {
  background: #222;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, textarea, select {
  width: 100%;
  margin-bottom: 10px;
  padding: 6px;
}

img {
  margin-top: 10px;
  border-radius: 8px;
}
</style>

</head>
<body>

<h1>Admin Panel – Version 5</h1>

<div class="tabs">
  <button onclick="switchTab(0)">Artikel 1–4</button>
  <button onclick="switchTab(4)">Artikel 5–8</button>
  <button onclick="switchTab(8)">Artikel 9–12</button>
  <button onclick="switchTab(12)">Artikel 13–16</button>
</div>

<hr>

<div id="editor"></div>

<button onclick="save()">💾 Speichern</button>

<script>
let data = [];
let settings = {};
let start = 0;

fetch("/api/menu")
.then(r => r.json())
.then(d => {
  data = d.menuData;
  settings = d.settings;
  render();
});

function switchTab(s){
  start = s;
  render();
}

function render(){
  const el = document.getElementById("editor");
  el.innerHTML = "";

  data.slice(start, start + 4).forEach((item, i) => {
    const idx = start + i;

    el.innerHTML += `
      <div class="card">

        <h3>Artikel ${idx + 1}</h3>

        <label>Titel</label>
        <input value="${item.title}"
          onchange="update(${idx},'title',this.value)">

        <label>Beschreibung</label>
        <textarea
          onchange="update(${idx},'text',this.value)">${item.text}</textarea>

        <label>Preis</label>
        <input value="${item.price}"
          onchange="update(${idx},'price',this.value)">

        <label>Bild Upload</label>
        <input type="file" onchange="upload(event,${idx})">

        <img src="${item.image}" width="120">

        <hr>

        <h4>Highlight Einstellungen</h4>

        <label>
          <input type="checkbox" ${item.highlight ? "checked" : ""}
            onchange="update(${idx},'highlight',this.checked)">
          Als Highlight anzeigen
        </label>

        <label>Animation</label>
        <select onchange="update(${idx},'effect',this.value)">
          <option value="zoom" ${item.effect==="zoom"?"selected":""}>Zoom</option>
          <option value="pulse" ${item.effect==="pulse"?"selected":""}>Pulse</option>
          <option value="float" ${item.effect==="float"?"selected":""}>Float</option>
          <option value="parallax" ${item.effect==="parallax"?"selected":""}>Parallax</option>
        </select>

      </div>
    `;
  });
}

function update(index, field, value){
  data[index][field] = value;
}

function upload(e, index){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    data[index].image = ev.target.result;
    render();
  };

  reader.readAsDataURL(file);
}

function save(){
  fetch("/api/menu", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      menuData: data,
      settings: settings
    })
  });

  alert("Gespeichert!");
}
</script>

</body>
</html>
