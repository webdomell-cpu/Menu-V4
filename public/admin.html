<!DOCTYPE html><html><body>
<h2>Admin</h2>
<input id="t" placeholder="Titel"><input id="p" placeholder="Preis"><input id="i" placeholder="Bild URL">
<button onclick="save()">Speichern</button>
<script>
async function save(){
const d=await fetch("/data").then(r=>r.json());
d.menu.push({title:t.value,price:p.value,image:i.value,text:"Beschreibung",highlight:false});
await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)});
alert("Saved");
}
</script></body></html>
