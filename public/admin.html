<!DOCTYPE html>
<html>
<body>

<h2>Admin</h2>

<select id="index"></select>

<input id="title" placeholder="Titel">
<input id="price" placeholder="Preis">
<input type="file" id="file">

<label>Highlight <input type="checkbox" id="highlight"></label>

<h3>Zeit</h3>
<label>Morgen <input type="checkbox" id="morning"></label>
<label>Mittag <input type="checkbox" id="noon"></label>
<label>Abend <input type="checkbox" id="evening"></label>
<label>Nacht <input type="checkbox" id="night"></label>

<button onclick="save()">Speichern</button>

<script>
for(let i=0;i<16;i++){
index.innerHTML+=`<option value="${i}">Artikel ${i+1}</option>`;
}

let data;

(async()=>{
data=await fetch("/data").then(r=>r.json());
if(!data.menu.length) data.menu=Array(16).fill({});
})();

async function save(){

const file=document.getElementById("file").files[0];
let image="";

if(file){
const form=new FormData();
form.append("image",file);

const res=await fetch("/upload",{method:"POST",body:form});
const json=await res.json();
image=json.path;
}

data.menu[index.value]={
title:title.value,
price:price.value,
image:image,
highlight:highlight.checked,
times:{
morning:morning.checked,
noon:noon.checked,
evening:evening.checked,
night:night.checked
}
};

await fetch("/save",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
alert("Gespeichert");
}
</script>

</body>
</html>
