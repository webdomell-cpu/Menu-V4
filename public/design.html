<!DOCTYPE html>
<html>
<body>

<h2>Design</h2>

<input id="bg" type="color"><br>
<input id="text" type="color"><br>

<button onclick="save()">Speichern</button>

<script>
async function save() {
  const data = await fetch("/data").then(r => r.json());

  data.settings.background = bg.value;
  data.settings.textColor = text.value;

  await fetch("/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });
}
</script>

</body>
</html>
