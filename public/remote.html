<!DOCTYPE html><html><body>
<h2>Remote</h2>
<button onclick="m('morning')">Frühstück</button>
<button onclick="m('lunch')">Mittag</button>
<button onclick="m('evening')">Abend</button>
<button onclick="m('night')">Nacht</button>
<script>
function m(mode){
fetch("/remote",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode})});
}
</script></body></html>
