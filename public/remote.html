<!DOCTYPE html>
<html>
<body>

<h2>Remote</h2>

<button onclick="reload()">Reload Displays</button>

<script>
function reload() {
  fetch("/remote", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ reload: true })
  });
}
</script>

</body>
</html>
