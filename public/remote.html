<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Remote V5</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 15px;
  margin-bottom: 10px;
  font-size: 18px;
}
</style>
</head>
<body>

<h1>Mobile Remote</h1>

<button onclick="reload()">🔄 Displays neu laden</button>

<button onclick="setHighlight(0)">⭐ Highlight 1</button>
<button onclick="setHighlight(1)">⭐ Highlight 2</button>
<button onclick="setHighlight(2)">⭐ Highlight 3</button>
<button onclick="setHighlight(3)">⭐ Highlight 4</button>

<script>
let state;

fetch("/api/menu")
.then(r=>r.json())
.then(d=>{
  state = d;
});

function reload(){
  fetch("/api/menu");
  alert("Displays aktualisiert");
}

function setHighlight(n){
  const highlights = state.menuData.filter(i=>i.highlight);

  if(highlights[n]){
    alert("Highlight wird angezeigt: " + highlights[n].title);
  } else {
    alert("Kein Highlight vorhanden");
  }
}
</script>

</body>
</html>
